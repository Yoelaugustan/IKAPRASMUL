# One-command stack: PostgreSQL + .NET backend + Next.js frontend.
# nginx is handled on the HOST (not here) and proxies to the published ports
# below. Secrets are read from a `.env` file next to this file (see .env.example).
#
#   docker compose up --build
#
services:
  db:
    # Matches the deployment server's PostgreSQL version.
    image: postgres:13-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ikaprasmul
    ports:
      # Exposed so the dump can be restored from the host (e.g. DBeaver / psql).
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      # Any *.sql dropped here is auto-restored on the FIRST boot (empty volume).
      # Place the database dump as ./db-init/ikaprasmul.sql to seed automatically.
      - ./db-init:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d ikaprasmul"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./Backend-IKAPRASMUL
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__DefaultConnection: "Host=db;Port=5432;Database=ikaprasmul;Username=postgres;Password=${POSTGRES_PASSWORD}"
      Smtp__Username: ${SMTP_USERNAME}
      Smtp__Password: ${SMTP_PASSWORD}
      # Browser origin allowed by CORS, e.g. https://ikaprasmul.com
      Cors__AllowedOrigins__0: ${FRONTEND_ORIGIN}
    ports:
      # host:container — host nginx proxies the public /api to localhost:5080.
      - "5080:8080"

  frontend:
    build:
      context: ./Frontend-IKAPRASMUL
      dockerfile: Dockerfile
      args:
        # Server-side proxy/fetch target inside the Docker network.
        API_URL: http://backend:8080
        # Inlined into the browser bundle at build time (mentor's note).
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # Runtime target for BFF route handlers + server components.
      API_URL: http://backend:8080
    ports:
      # host nginx proxies the public site to localhost:3000.
      - "3000:3000"

volumes:
  pgdata:
